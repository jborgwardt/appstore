version: "3.7"
services:
  postgres:
    image: postgres:16-alpine
    container_name: mediastorm_postgres
    environment:
      POSTGRES_DB: mediastorm
      POSTGRES_USER: mediastorm
      POSTGRES_PASSWORD: $APP_PASSWORD
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediastorm"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: godver3/mediastorm:latest
    container_name: mediastorm_app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - $APP_PORT:7777
    volumes:
      - ${APP_DATA_DIR}/data/cache:/root/cache
    environment:
      - TZ=$TZ
      - DATABASE_URL=postgres://mediastorm:$APP_PASSWORD@postgres:5432/mediastorm?sslmode=disable
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "http://localhost:7777/health"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3
