category: media
version: "latest"
port: 7777
description: >-
  MediaStorm is a self-hosted streaming media server that sources content
  from Usenet (via SABnzbd-compatible engines) and debrid providers
  (Real-Debrid, Torbox, AllDebrid), transmuxing to HLS on the fly.

  Stream to Infuse, VLC, or any HLS-compatible player. Includes a full
  admin dashboard, Prowlarr/indexer integration, and Dolby Vision support.
